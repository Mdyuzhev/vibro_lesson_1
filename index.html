<!DOCTYPE html>
<!-- Объявляем тип документа — HTML5 -->
<html lang="ru">
<!-- Открываем корневой элемент страницы, указываем язык — русский -->
<head>
    <!-- Начало секции с мета-информацией и настройками страницы -->
    <meta charset="UTF-8">
    <!-- Устанавливаем кодировку UTF-8 для поддержки всех символов -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Настраиваем viewport для корректного отображения на мобильных устройствах -->
    <title>Приветствие</title>
    <!-- Заголовок страницы, отображается во вкладке браузера -->
    <style>
        /* Начало блока стилей CSS для оформления элементов */
        body {
            /* Стили для всего тела страницы */
            font-family: Arial, sans-serif;
            /* Устанавливаем шрифт — Arial, или любой без засечек */
            max-width: 600px;
            /* Ограничиваем максимальную ширину контента */
            margin: 50px auto;
            /* Центрируем блок и добавляем отступ сверху */
            text-align: center;
            /* Выравниваем текст по центру */
            background: linear-gradient(135deg, #667eea, #764ba2);
            /* Градиентный фон: угол 135°, переход от фиолетово-синего к фиолетовому */
            color: white;
            /* Цвет текста — белый */
            min-height: 100vh;
            /* Минимальная высота — 100% высоты экрана */
            display: flex;
            /* Используем flexbox для выравнивания содержимого */
            flex-direction: column;
            /* Элементы внутри располагаются вертикально */
            justify-content: center;
            /* Центрируем содержимое по вертикали */
        }
        h1 {
            /* Стили для заголовка */
            font-size: 32px;
            /* Размер шрифта заголовка */
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            /* Тень у текста: смещение 2px, размытие 4px, полупрозрачный чёрный */
        }
        button {
            /* Стили для кнопки */
            padding: 15px 30px;
            /* Внутренние отступы кнопки: 15px сверху/снизу, 30px слева/справа */
            font-size: 16px;
            /* Размер шрифта внутри кнопки */
            cursor: pointer;
            /* Курсор в виде руки при наведении */
            border: none;
            /* Убираем рамку у кнопки */
            border-radius: 25px;
            /* Скругляем углы кнопки радиусом 25px */
            background: white;
            /* Фон кнопки — белый */
            color: #667eea;
            /* Цвет текста кнопки — фиолетово-синий */
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            /* Тень: смещение 0 по X, 4px по Y, размытие 15px, цвет — полупрозрачный чёрный */
            transition: transform 0.2s, box-shadow 0.2s;
            /* Плавная анимация трансформации и тени за 0.2 секунды */
        }
        button:hover {
            /* Стили кнопки при наведении курсора */
            transform: translateY(-2px);
            /* Сдвигаем кнопку на 2px вверх */
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
            /* Усиливаем тень: 6px по Y, размытие 20px */
        }
    </style>
</head>
<body>
    <!-- Начало видимой части страницы -->
    <h1 id="greeting">Загрузка...</h1>
    <!-- Заголовок с персональным приветствием, id нужен для изменения текста через JS -->

    <button onclick="location.reload()">Ввести имя снова</button>
    <!-- Кнопка перезагрузки страницы для повторного ввода имени -->

    <script>
        // Начало блока JavaScript для интерактивности
        const name = prompt('Как тебя зовут?');
        // Запрашиваем имя пользователя через всплывающее окно prompt
        const greetingElement = document.getElementById('greeting');
        // Находим элемент заголовка по id для изменения текста
        if (name && name.trim() !== '') {
            // Проверяем: имя введено и не состоит только из пробелов
            greetingElement.textContent = 'Привет, ' + name + '!';
            // Выводим персональное приветствие с введённым именем
        } else {
            // Если имя не введено или пустое
            greetingElement.textContent = 'Привет, незнакомец!';
            // Выводим приветствие для незнакомца
        }
    </script>
</body>
</html>
