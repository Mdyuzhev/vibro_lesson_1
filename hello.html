<!DOCTYPE html>
<!-- Объявляем тип документа — HTML5 -->
<html lang="ru">
<!-- Открываем корневой элемент страницы, указываем язык — русский -->
<head>
    <!-- Начало секции с мета-информацией и настройками страницы -->
    <meta charset="UTF-8">
    <!-- Устанавливаем кодировку UTF-8 для поддержки всех символов -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Настраиваем viewport для корректного отображения на мобильных устройствах -->
    <title>Моя страница</title>
    <!-- Заголовок страницы, отображается во вкладке браузера -->
    <style>
        /* Начало блока стилей CSS для оформления элементов */
        body {
            /* Стили для всего тела страницы */
            font-family: Arial, sans-serif;
            /* Устанавливаем шрифт — Arial, или любой без засечек */
            max-width: 600px;
            /* Ограничиваем максимальную ширину контента */
            margin: 50px auto;
            /* Центрируем блок и добавляем отступ сверху */
            text-align: center;
            /* Выравниваем текст по центру */
            background: linear-gradient(135deg, #667eea, #764ba2);
            /* Градиентный фон: угол 135°, переход от фиолетово-синего к фиолетовому */
            color: white;
            /* Цвет текста — белый */
            min-height: 100vh;
            /* Минимальная высота — 100% высоты экрана */
            display: flex;
            /* Используем flexbox для выравнивания содержимого */
            flex-direction: column;
            /* Элементы внутри располагаются вертикально */
            justify-content: center;
            /* Центрируем содержимое по вертикали */
        }
        button {
            /* Стили для кнопки */
            padding: 15px 30px;
            /* Внутренние отступы кнопки: 15px сверху/снизу, 30px слева/справа */
            font-size: 16px;
            /* Размер шрифта внутри кнопки */
            cursor: pointer;
            /* Курсор в виде руки при наведении */
            border: none;
            /* Убираем рамку у кнопки */
            border-radius: 25px;
            /* Скругляем углы кнопки радиусом 25px */
            background: white;
            /* Фон кнопки — белый */
            color: #667eea;
            /* Цвет текста кнопки — фиолетово-синий */
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            /* Тень: смещение 0 по X, 4px по Y, размытие 15px, цвет — полупрозрачный чёрный */
            transition: transform 0.2s, box-shadow 0.2s;
            /* Плавная анимация трансформации и тени за 0.2 секунды */
        }
        button:hover {
            /* Стили кнопки при наведении курсора */
            transform: translateY(-2px);
            /* Сдвигаем кнопку на 2px вверх */
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
            /* Усиливаем тень: 6px по Y, размытие 20px */
        }
    </style>
</head>
<body>
    <!-- Начало видимой части страницы -->
    <h1>Добро пожаловать!</h1>
    <!-- Заголовок первого уровня — главный заголовок страницы -->
    
    <p>Это пример простой HTML-страницы с основными элементами.</p>
    <!-- Параграф текста — обычный абзац с информацией -->
    
    <img src="https://via.placeholder.com/300x200" alt="Заглушка изображения">
    <!-- Картинка-заглушка: src — URL изображения, alt — текст, если картинка не загрузится -->
    
    <button onclick="changeColor()">Нажми меня</button>
    <!-- Кнопка с обработчиком события: при клике вызывает функцию changeColor() -->

    <script>
        // Начало блока JavaScript для интерактивности
        function changeColor() {
            // Объявляем функцию changeColor для изменения фона
            const randomColor = '#' + Math.floor(Math.random() * 16777215).toString(16);
            // Генерируем случайный цвет в формате HEX: Math.random() * 16777215 даёт число от 0 до 16777215,
            // toString(16) преобразует его в шестнадцатеричную систему, добавляем '#' в начале
            document.body.style.background = randomColor;
            // Устанавливаем случайный цвет фона для body
            alert('Ты нажал кнопку!');
            // Показываем всплывающее сообщение с текстом
        }
    </script>
</body>
</html>
